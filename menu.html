<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مطعمك - OR Delivery</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🍽️ مطعمك</h1>
    <p>اطلب أكلك ويوصلك مع OR Delivery 🛵</p>
</header>


<section class="menu">

<div class="card">
    <img src="pizza.jpg">
    <h2>Pizza 4 Fromages</h2>
    <p>بيتزا بالجبن</p>
    <span>18 د.ت</span>
    <button onclick="addToCart('Pizza 4 Fromages',18)">
        أضف للسلة
    </button>
</div>


<div class="card">
    <img src="burger.jpg">
    <h2>Burger Maison</h2>
    <p>برغر منزلي</p>
    <span>12 د.ت</span>
    <button onclick="addToCart('Burger Maison',12)">
        أضف للسلة
    </button>
</div>


<div class="card">
    <img src="frites.jpg">
    <h2>Frites</h2>
    <p>بطاطا مقلية</p>
    <span>5 د.ت</span>
    <button onclick="addToCart('Frites',5)">
        أضف للسلة
    </button>
</div>

</section>


<div class="cart">
<h2>🛒 طلبك</h2>
<ul id="cart"></ul>

<h3>
المجموع: <span id="total">0</span> د.ت
</h3>

<button class="order" onclick="sendOrder()">
تأكيد الطلب عبر واتساب
</button>

</div>


<script>

let total = 0;
let items=[];

function addToCart(name,price){

items.push(name);
total += price;

document.getElementById("cart").innerHTML =
items.map(i=>"<li>"+i+"</li>").join("");

document.getElementById("total").innerHTML=total;
}


function sendOrder(){

let message="طلب جديد من OR Delivery:%0A";
message += items.join("%0A");
message += "%0Aالمجموع: "+total+" د.ت";

window.open(
"https://wa.me/21694773359?text="+message
);

}

</script>


</body>
</html>
